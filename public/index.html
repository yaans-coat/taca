<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>taca // sleek-access</title>
    <style>
        :root {
            --bg: #030303;
            --accent: #ffffff;
            --secondary: #1a1a1a;
            --text-dim: #555;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--accent);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Binary Background */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .ui-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            text-align: center;
            padding: 20px;
        }

        .logo {
            font-size: 0.8rem;
            letter-spacing: 0.5rem;
            color: var(--text-dim);
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .input-group {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 10px 20px;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .input-group:focus-within {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1.1rem;
            padding: 10px 0;
            font-family: 'IBM Plex Mono', monospace;
            text-align: center;
        }

        input::placeholder {
            color: var(--text-dim);
            letter-spacing: 2px;
        }

        .info {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <canvas id="binaryCanvas"></canvas>

    <div class="ui-container">
        <div class="logo">taca // utility</div>
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="ENTER URL" autofocus spellcheck="false" autocomplete="off">
        </div>
        <div class="info">system_status: optimal // encrypted_path: active</div>
    </div>

    <script>
        const canvas = document.getElementById('binaryCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, columns;
        const fontSize = 14;
        const drops = [];
        const mouse = { x: -100, y: -100 };

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / fontSize);
            for (let i = 0; i < columns; i++) drops[i] = 1;
        }

        window.addEventListener('resize', init);
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        function draw() {
            ctx.fillStyle = 'rgba(3, 3, 3, 0.15)';
            ctx.fillRect(0, 0, width, height);

            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = Math.random() > 0.5 ? "1" : "0";
                const x = i * fontSize;
                const y = drops[i] * fontSize;

                // Mouse proximity effect
                const dx = x - mouse.x;
                const dy = y - mouse.y;
                const distance = Math.sqrt(dx*dx + dy*dy);
                
                if (distance < 100) {
                    ctx.fillStyle = '#ffffff'; // Light up on hover
                } else {
                    ctx.fillStyle = '#111'; // Dim normally
                }

                ctx.fillText(text, x, y);

                if (y > height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        init();
        setInterval(draw, 33);

        const input = document.getElementById('urlInput');
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && input.value) {
                window.location.href = '/tunnel?url=' + encodeURIComponent(input.value);
            }
        });
    </script>
</body>
</html>
